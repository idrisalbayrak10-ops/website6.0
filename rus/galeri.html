gin-top:90px; } } .lightbox-overlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:9999; } .lightbox-overlay.active{ display:flex; } .lightbox-inner{ position:relative; max-width:90vw; max-height:90vh; display:flex; flex-direction:column; align-items:center; } .lightbox-image{ max-width:100%; max-height:80vh; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.9); } .lightbox-caption{ margin-top:10px; font-size:14px; color:#e5e7eb; text-align:center; text-shadow:0 0 10px rgba(0,0,0,1); } .lightbox-close{ position:absolute; top:-40px; right:0; font-size:24px; color:#e5e7eb; cursor:pointer; padding:6px 10px; border-radius:999px; border:1px solid rgba(148,163,184,0.7); } .lightbox-arrow{ position:absolute; top:50%; transform:translateY(-50%); width:40px;height:40px; border-radius:999px; border:1px solid rgba(148,163,184,0.7); color:#e5e7eb; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; user-select:none; } .lightbox-arrow-left{ left:-60px; } .lightbox-arrow-right{ right:-60px; } @media(max-width:700px){ .lightbox-arrow-left{ left:10px; } .lightbox-arrow-right{ right:10px; } .lightbox-close{ top:10px; right:10px; } } user-select:none; transition:transform .15s ease, filter .15s ease; font-size:13px; letter-spacing:.03em; } </style>

<script>
    document.querySelectorAll('.folder').forEach(function(folder){
      const header = folder.querySelector('.folder-header');
      const body   = folder.querySelector('.folder-body');
      const icon   = folder.querySelector('.folder-toggle-icon');

      if (!header || !body || !icon) return;

      if (folder.classList.contains('open')) {
        body.style.maxHeight = body.scrollHeight + 'px';
        icon.textContent = '−';
      }

      header.addEventListener('click', function(){
        const isOpen = folder.classList.contains('open');
        if (isOpen){
          folder.classList.remove('open');
          body.style.maxHeight = 0;
          icon.textContent = '+';
        } else {
          folder.classList.add('open');
          body.style.maxHeight = body.scrollHeight + 'px';
          icon.textContent = '−';
        }
      });
    });

    const lightbox        = document.getElementById('lightbox');
    const lightboxImage   = document.getElementById('lightboxImage');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const lightboxClose   = document.getElementById('lightboxClose');
    const lightboxPrev    = document.getElementById('lightboxPrev');
    const lightboxNext    = document.getElementById('lightboxNext');

    const thumbImgs = Array.from(document.querySelectorAll('.thumb img'));
    const images = thumbImgs.map(function(img){
      const captionEl = img.parentElement.querySelector('span');
      return {
        src: img.getAttribute('src'),
        alt: img.getAttribute('alt') || (captionEl ? captionEl.textContent : '')
      };
    });

    let currentIndex = 0;

    function openLightbox(index){
      currentIndex = index;
      showImage(currentIndex);
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(){
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }
    function showImage(index){
      const item = images[index];
      if (!item) return;
      lightboxImage.src = item.src;
      lightboxImage.alt = item.alt;
      lightboxCaption.textContent = item.alt || '';
    }
    function showNext(){
      currentIndex = (currentIndex + 1) % images.length;
      showImage(currentIndex);
    }
    function showPrev(){
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      showImage(currentIndex);
    }

    thumbImgs.forEach(function(img, index){
      img.addEventListener('click', function(e){
        e.stopPropagation();
        openLightbox(index);
      });
      const captionEl = img.parentElement.querySelector('span');
      if (captionEl){
        captionEl.addEventListener('click', function(e){
          e.stopPropagation();
          openLightbox(index);
        });
      }
    });

    lightboxClose.addEventListener('click', function(e){ e.stopPropagation(); closeLightbox(); });
    lightboxPrev.addEventListener('click', function(e){ e.stopPropagation(); showPrev(); });
    lightboxNext.addEventListener('click', function(e){ e.stopPropagation(); showNext(); });

    lightbox.addEventListener('click', function(e){
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function(e){
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowRight') showNext();
      else if (e.key === 'ArrowLeft') showPrev();
    });
  </script>

<script>
    const revealItems = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          obs.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.18,
      rootMargin: '0px 0px -8% 0px'
    });

    revealItems.forEach((item, index) => {
      const delay = item.dataset.direction === 'left' ? index * 0.025 : index * 0.03;
      item.style.setProperty('--reveal-delay', `${delay}s`);
      observer.observe(item);
    });
  </script>
<script>
      // Sayfa Yüklendiğinde Popup Kontrolü
      document.addEventListener("DOMContentLoaded", function() {
          // localStorage kontrolü: Kullanıcı daha önce "kabul ettim" dedi mi?
          if (!localStorage.getItem("albaCookieSeen")) {
              document.getElementById("cookie-overlay").style.display = "flex";
          }
      });

      const acceptBtn = document.getElementById("btnAccept");
      const settingsBtn = document.getElementById("btnSettings");

      // Üst buton: Animasyon ve Kapatma
      if(acceptBtn) {
          acceptBtn.addEventListener("click", function() {
              // Butona basıldığını hissettirmek için ufak bir bekleme (opsiyonel)
              setTimeout(() => {
                  document.getElementById("cookie-overlay").style.display = "none";
                  // Kullanıcının gördüğünü tarayıcıya kaydet
                  localStorage.setItem("albaCookieSeen", "true");
              }, 200);
          });
      }

      // Alt buton: Çerez politikası sayfasına yönlendirir
      if(settingsBtn) {
          settingsBtn.addEventListener("click", function() {
               window.location.href = "cookie-policy-ru.html";
          });
      }
  </script>
