<!DOCTYPE html>

<html lang="ru">
<head>
<!-- Универсальный favicon-блок -->
<link href="/assets/icons/AlbaLogo.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/icons/AlbaLogo.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/icons/AlbaLogo.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="/manifest.json" rel="manifest"/>
<meta content="#020617" name="theme-color"/>
<meta content="#020617" name="msapplication-TileColor"/>
<meta content="/favicon.png" name="msapplication-TileImage"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Корзина – AlbaSpace</title>
<!-- Site genel stilleri -->
<link href="/assets/css/site.css" rel="stylesheet"/>
<link href="/assets/css/shop.css" rel="stylesheet"/>
<!-- İkinci sayfadan gelen özel stiller -->
<style>
    :root { --header-bg: #020617; --accent: #00c2ff; --page-bg: #050b27; --text-main: #ffffff; --text-muted: #9ca3af; }
    .chart-payment-bar { display:flex; justify-content:center; margin-top: 20px; margin-bottom:18px; }
    .chart-payment-bar .payment-icons { position:relative; display: flex; gap:24px; justify-content:center; align-items:center; padding:6px 12px; border-radius:10px; z-index:3; }
    .chart-payment-bar .payment-icons img { width:52px; height:auto; opacity:0.95; }
    .chart-payment-bar .payment-icons-link { display:block !important; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:calc(100% + 36px); height:72px; background: transparent !important; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); border-radius:10px; z-index:2; cursor:pointer; }
    .whatsapp-btn { display: inline-block; margin-top: 10px; width: 100%; text-align: center; background-color: #25D366; color: white; padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    .whatsapp-btn:hover { background-color: #128C7E; }
  </style>
<style>
    /* Override default site stylesheet background and force white text for cart page */
    body{ background-color: var(--page-bg) !important; color: var(--text-main) !important; }
    html{ background-color: var(--page-bg) !important; }
  </style>
<!-- Scriptler -->
<script defer="" src="/assets/js/include.js"></script>
<script defer="" src="/assets/js/menu-toggle.js"></script>
<script defer="" src="/assets/js/cart.js"></script>
<link href="/assets/css/cart-white.css" rel="stylesheet"/>
</head>
<body>
<!-- Türkçe Header -->
<div data-include="/header-ru.html"></div>
<main class="cart-page">
<h1>Корзина</h1>
<!-- Sepet ürünleri konteyneri -->
<section id="cartItems"></section>
<!-- Sepet özeti ve kargo hesaplama -->
<section class="cart-summary" id="cartSummary">
<div class="cart-total-row">
<span>Итого:</span>
<span id="cartTotal">0,00 TL</span>
</div>
<div class="shipping-estimate">
<h2>Расчетная стоимость доставки</h2>
<form>
<label>
            Сторона
            <select>
<option value="Türkiye">Турция</option>
<option value="United States">США</option>
<option value="United Kingdom">Великобритания</option>
<option value="Ukraine">Украина</option>
<option value="Russia">Россия</option>
</select>
</label>
<label>
            Штат / Область
            <input placeholder="Штат или Область" type="text"/>
</label>
<label>
            Почтовый индекс
            <input placeholder="Почтовый индекс" type="text"/>
</label>
<button class="btn-secondary" type="button">Рассчитать</button>
</form>
</div>
<!-- Standart Checkout Butonu -->
<button class="btn-primary checkout-btn" type="button">ОФОРМИТЬ ЗАКАЗ</button>
<!-- WhatsApp ödemeye yönlendiren buton (dinamik mesaj oluşturulacak) -->
<a class="whatsapp-btn" href="#" id="whatsappBtn" rel="noopener">ОПЛАТИТЬ ЧЕРЕЗ WHATSAPP</a>
<!-- İkinci sayfadan gelen Ödeme İkonları -->
<div class="chart-payment-bar">
<div aria-hidden="true" class="payment-icons">
<!-- Link mantığı korundu -->
<span class="payment-icons-link" onclick="location.href='/rus/cart.html';" onkeydown="if(event.key==='Enter'){location.href='/rus/cart.html';}" role="link" tabindex="0"></span>
<img alt="ийзико" src="/assets/icons/iyzico_tr.png"/>
<img alt="мастеркард" src="/assets/icons/mastercard.png"/>
<img alt="виза" src="/assets/icons/visa.png"/>
</div>
</div>
</section>
<!-- Sepet boş mesajı -->
<p class="cart-empty" hidden="" id="emptyCartMessage">Ваша корзина пуста.</p>
</main>
<!-- Türkçe Footer -->
<div data-include="/footer-ru.html"></div>
<script>
    /**
     * Sepet içeriğini Türkçe olarak render eden fonksiyon.
     */
    function renderCartTR() {
      const container = document.getElementById('cartItems');
      const summary = document.getElementById('cartSummary');
      const emptyMsg = document.getElementById('emptyCartMessage');
      const totalEl = document.getElementById('cartTotal');
      
      const cart = cartManager.load();

      if (!cart.length) {
        container.innerHTML = '';
        summary.style.display = 'none';
        emptyMsg.hidden = false;
        return;
      }

      emptyMsg.hidden = true;
      summary.style.display = '';

      let total = 0;

      container.innerHTML = cart.map((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        
        return `
          <article class="cart-item" data-index="${index}">
            <img src="${item.image}" alt="${item.name}">
            <div class="cart-item-main">
              <h2>${item.name}</h2>
              <p>${item.color ? item.color : ''}${item.size ? ' / ' + item.size : ''}</p>
              <div class="cart-item-price">TL${item.price.toFixed(2)}</div>
            </div>
            <div class="cart-item-actions">
              <div class="qty-control" data-qty>
                <button type="button" class="qty-btn" data-qty-minus>&minus;</button>
                <input type="number" min="1" value="${item.qty}" class="qty-input" data-qty-input>
                <button type="button" class="qty-btn" data-qty-plus>&plus;</button>
              </div>
              <!-- 'Remove' metni 'Kaldır' olarak değiştirildi -->
              <button type="button" class="cart-remove" data-remove>Удалить</button>
              <div class="cart-item-total">TL${itemTotal.toFixed(2)}</div>
            </div>
          </article>
        `;
      }).join('');

      // Para birimi gösterimi TL olarak güncellendi
      totalEl.textContent = 'TL' + total.toFixed(2);

      // Event handler'ları bağla
      container.querySelectorAll('.cart-item').forEach(row => {
        const index = Number(row.dataset.index);
        const input = row.querySelector('[data-qty-input]');

        row.querySelector('[data-qty-minus]').addEventListener('click', () => {
          const value = Math.max(1, Number(input.value || '1') - 1);
          input.value = value;
          cartManager.updateQty(index, value);
          renderCartTR();
        });

        row.querySelector('[data-qty-plus]').addEventListener('click', () => {
          const value = Number(input.value || '1') + 1;
          input.value = value;
          cartManager.updateQty(index, value);
          renderCartTR();
        });

        row.querySelector('[data-remove]').addEventListener('click', () => {
          cartManager.remove(index);
          renderCartTR();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', renderCartTR);
  </script>
<script>
    // Oluşturulmuş sepete göre WhatsApp mesajı üreten ve açan fonksiyon (Türkçe)
    (function() {
      const phone = '905387781018';

      function buildMessageTR(cart) {
        const lines = ['Здравствуйте, товары в моей корзине:'];
        let total = 0;
        cart.forEach(item => {
          const itemTotal = (Number(item.price) || 0) * (Number(item.qty) || 0);
          total += itemTotal;
          const attrs = [(item.color || ''), (item.size || '')].filter(Boolean).join(' / ');
          lines.push(`- ${item.name}${attrs ? ' (' + attrs + ')' : ''} x${item.qty}: TL${itemTotal.toFixed(2)}`);
        });
        lines.push(`Итого: TL${total.toFixed(2)}`);
        return lines.join('\n');
      }

      function openWhatsAppTR(e) {
        e && e.preventDefault();
        const cart = window.cartManager ? window.cartManager.load() : [];
        if (!cart || !cart.length) {
          alert('Ваша корзина пуста.');
          return;
        }
        const text = encodeURIComponent(buildMessageTR(cart));
        const url = `https://wa.me/${phone}?text=${text}`;
        window.open(url, '_blank');
      }

      document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('whatsappBtn');
        if (btn) btn.addEventListener('click', openWhatsAppTR);
      });
    })();
  </script>
<script>
    const revealItems = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          obs.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.18,
      rootMargin: '0px 0px -8% 0px'
    });

    revealItems.forEach((item, index) => {
      const delay = item.dataset.direction === 'left' ? index * 0.025 : index * 0.03;
      item.style.setProperty('--reveal-delay', `${delay}s`);
      observer.observe(item);
    });
  </script>
<script>
      // Sayfa Yüklendiğinde Popup Kontrolü
      document.addEventListener("DOMContentLoaded", function() {
          // localStorage kontrolü: Kullanıcı daha önce "kabul ettim" dedi mi?
          if (!localStorage.getItem("albaCookieSeen")) {
              document.getElementById("cookie-overlay").style.display = "flex";
          }
      });

      const acceptBtn = document.getElementById("btnAccept");
      const settingsBtn = document.getElementById("btnSettings");

      // Üst buton: Animasyon ve Kapatma
      if(acceptBtn) {
          acceptBtn.addEventListener("click", function() {
              // Butona basıldığını hissettirmek için ufak bir bekleme (opsiyonel)
              setTimeout(() => {
                  document.getElementById("cookie-overlay").style.display = "none";
                  // Kullanıcının gördüğünü tarayıcıya kaydet
                  localStorage.setItem("albaCookieSeen", "true");
              }, 200);
          });
      }

      // Alt buton: Çerez politikası sayfasına yönlendirir
      if(settingsBtn) {
          settingsBtn.addEventListener("click", function() {
               window.location.href = "cerez-politikasi.html";
          });
      }
  </script>
</body>
</html>
