<!DOCTYPE html>

<html class="product-text-black" lang="ru">
<head>
<link href="/assets/icons/AlbaLogo.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/icons/AlbaLogo.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="/manifest.json" rel="manifest"/>
<meta content="#020617" name="theme-color"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Футболка – Alba Space</title>
<meta content="Качественная унисекс-футболка с логотипом Alba Space — дышащая ткань, все размеры." name="description"/>
<meta content="Футболка – Alba Space" property="og:title"/>
<meta content="Качественная унисекс-футболка с логотипом Alba Space — дышащая ткань, все размеры." property="og:description"/>
<meta content="/assets/images/shirt11.png" property="og:image"/>
<meta content="https://albaspace.com.tr/rus/product-shirt1.html" property="og:url"/>
<meta content="product" property="og:type"/>
<link href="/assets/css/site.css" rel="stylesheet"/>
<link href="/assets/css/fix-layout.css" rel="stylesheet"/>
<link href="/assets/css/product.css" rel="stylesheet"/>
<link href="/assets/css/product-overrides.css" rel="stylesheet"/>
<link href="/assets/css/product-text-black.css" rel="stylesheet"/>
<style>
    :root { --header-bg: #020617; }
    body { background: #ffffff; margin: 0; }
  </style>
<script defer="" src="/assets/js/include.js"></script>
<script defer="" src="/assets/js/menu-toggle.js"></script>
<script defer="" src="/assets/js/cart.js"></script>
</head>
<body>
<div data-include="/header-ru-black"></div>
<main class="product-page-wrap">
<nav class="product-breadcrumb">
<a href="/rus/shop.html" style="color:inherit;text-decoration:none">Магазин</a><span>/</span>Одежда
    </nav>
<div class="product-main-grid">
<div class="product-image-col p-reveal">
<div class="product-main-image-wrap">
<img alt="Футболка" id="mainImage" src="/assets/images/shirt11.png"/>
</div>
<div class="product-thumbs">
<button aria-label="Футболка" class="thumb-btn active" onclick="changeImage(this,'/assets/images/shirt11.png')">
<img alt="Футболка" loading="lazy" src="/assets/images/shirt11.png"/>
</button>
<button aria-label="Футболка 2" class="thumb-btn" onclick="changeImage(this,'/assets/images/2shirt1.png')">
<img alt="Футболка 2" loading="lazy" src="/assets/images/2shirt1.png"/>
</button>
<button aria-label="Футболка 3" class="thumb-btn" onclick="changeImage(this,'/assets/images/2shirt2.png')">
<img alt="Футболка 3" loading="lazy" src="/assets/images/2shirt2.png"/>
</button>
<button aria-label="Футболка 4" class="thumb-btn" onclick="changeImage(this,'/assets/images/2shirt3.png')">
<img alt="Футболка 4" loading="lazy" src="/assets/images/2shirt3.png"/>
</button>
</div>
</div>
<div class="product-info-col p-reveal" style="transition-delay:0.12s">
<h1 class="product-title">Футболка</h1>
<div class="product-price-block">
<span class="product-price-current">630,00 ₺</span>
</div>
<div class="product-features-card">
<h3>Характеристики</h3>
<ul class="product-features-list">
<li><span class="feature-dot"></span>Высококачественный хлопок</li>
<li><span class="feature-dot"></span>Дышащая конструкция</li>
<li><span class="feature-dot"></span>Принт Alba Space</li>
<li><span class="feature-dot"></span>Все размеры в наличии</li>
</ul>
</div>
<div class="product-size-wrap">
<label>Выбрать размер</label>
<div class="size-options">
<button class="size-btn" onclick="selectSize(this)">XS</button>
<button class="size-btn active" onclick="selectSize(this)">С</button>
<button class="size-btn" onclick="selectSize(this)">М</button>
<button class="size-btn" onclick="selectSize(this)">л</button>
<button class="size-btn" onclick="selectSize(this)">XL</button>
<button class="size-btn" onclick="selectSize(this)">XXL</button>
</div>
</div>
<div class="product-payment-icons">
<img alt="Мастеркард" src="/assets/icons/mastercard.png"/>
<img alt="Виза" src="/assets/icons/visa.png"/>
</div>
<div class="product-cta-row">
<div class="qty-control">
<button class="qty-btn" onclick="updateQty(-1)">−</button>
<input class="qty-input" id="qtyInput" min="1" type="number" value="1"/>
<button class="qty-btn" onclick="updateQty(1)">+</button>
</div>
<button class="btn-add-cart" data-add-label="В КОРЗИНУ" data-added-label="✓ ДОБАВЛЕНО!" data-product-id="shirt1" data-product-image="/assets/images/shirt11.png" data-product-name="Футболка" id="addToCartBtn">
            В КОРЗИНУ
          </button>
<a class="btn-buy-now" href="https://www.shopier.com/albaspaceshop/46492707" rel="noopener noreferrer" target="_blank">КУПИТЬ</a>
</div>
</div>
</div>
<section class="related-section p-reveal">
<h2>Вам также может понравиться</h2>
<div class="related-accent-line"></div>
<div id="related-products-container"></div>
</section>
</main>
<div data-include="/footer-ru-black"></div>
<script>
    function changeImage(btn, src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    function updateQty(d) {
      const i = document.getElementById('qtyInput');
      i.value = Math.max(1, parseInt(i.value || 1) + d);
    }
    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const obs = new IntersectionObserver(
      es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.p-reveal').forEach(el => obs.observe(el));
    document.getElementById('addToCartBtn').addEventListener('click', function() {
      const btn = this, qty = parseInt(document.getElementById('qtyInput').value || 1, 10);
      if (typeof cartManager !== 'undefined') {
        cartManager.addItem({
          id: btn.dataset.productId, name: btn.dataset.productName,
          image: btn.dataset.productImage, url: window.location.pathname, qty
        });
      }
      btn.classList.add('added');
      btn.textContent = btn.dataset.addedLabel;
      btn.disabled = true;
      setTimeout(() => {
        btn.classList.remove('added');
        btn.textContent = btn.dataset.addLabel;
        btn.disabled = false;
      }, 1600);
    });
  </script>
<script defer="" src="/assets/js/related-products.js"></script>
</body>
</html>
