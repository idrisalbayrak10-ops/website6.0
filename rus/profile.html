<!DOCTYPE html>

<html lang="ru">
<head>
<!-- Универсальный favicon-блок -->
<link href="/assets/icons/AlbaLogo.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/icons/AlbaLogo.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/icons/AlbaLogo.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="/manifest.json" rel="manifest"/>
<meta content="#020617" name="theme-color"/>
<meta content="#020617" name="msapplication-TileColor"/>
<meta content="/favicon.png" name="msapplication-TileImage"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Профиль — AlbaSpace</title>
<link href="/assets/css/site.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<script defer="" src="/assets/js/include.js"></script>
<style>
    :root {
      --page-bg: #020617;
      --accent: #00c2ff;
      --text-main: #f3f4f6;
    }
    body {
      background-color: var(--page-bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-field, .select-field {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.3s ease;
    }
    .input-field:focus, .select-field:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(0, 194, 255, 0.2);
    }
    /* Option styling for select */
    .select-field option {
      background-color: #020617;
      color: white;
    }
    .btn-primary {
      background-color: var(--accent);
      color: #000;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #38bdf8;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">
<div data-include="/header-ru.html"></div>
<main class="flex-grow flex items-center justify-center px-4 py-20">
<div class="glass-card w-full max-w-2xl p-8 rounded-3xl shadow-2xl">
<h1 class="text-3xl font-bold text-center mb-8 text-white">Заполните профиль</h1>
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  
<div>
<label class="block text-sm font-medium text-gray-400 mb-2">Имя и Фамилия</label>
<input class="input-field w-full px-4 py-3 rounded-xl" placeholder="Ваше имя и фамилия" required="" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-400 mb-2">Возраст</label>
<input class="input-field w-full px-4 py-3 rounded-xl" max="120" min="1" placeholder="Ваш возраст" required="" type="number"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium text-gray-400 mb-2">Пол</label>
<select class="select-field w-full px-4 py-3 rounded-xl" required="">
<option disabled="" selected="" value="">Выберите</option>
<option value="male">Мужской</option>
<option value="female">Женский</option>
<option value="other">Другой</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-gray-400 mb-2">Город проживания</label>
<input class="input-field w-full px-4 py-3 rounded-xl" placeholder="Город" required="" type="text"/>
</div>
</div>
<div class="pt-6">
<button class="btn-primary w-full py-4 rounded-xl text-lg font-bold uppercase tracking-wider" type="submit">
            Сохранить
          </button>
</div>
</form>
</div>
</main>
<div data-include="/footer-ru.html"></div>
</body>
</html>
