<!DOCTYPE html>
<html lang="tr" class="product-text-black">
<head>
  <link rel="icon" type="image/png" href="/assets/icons/AlbaLogo.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/assets/icons/AlbaLogo.png" sizes="180x180">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#020617">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Hoodie – Alba Space</title>
  <meta name="description" content="Alba Space Hoodie — yüksek kaliteli kumaş, rahat ve sıcak. Uzay temalı tasarım.">
  <meta property="og:title" content="Hoodie – Alba Space">
  <meta property="og:description" content="Alba Space Hoodie — yüksek kaliteli kumaş, rahat ve sıcak.">
  <meta property="og:image" content="/assets/images/hoodie11.png">
  <meta property="og:url" content="https://albaspace.com.tr/product-hoodie1.html">
  <meta property="og:type" content="product">

  <link rel="stylesheet" href="/assets/css/site.css">
  <link rel="stylesheet" href="/assets/css/fix-layout.css">
  <link rel="stylesheet" href="/assets/css/product.css">
  <link rel="stylesheet" href="/assets/css/product-overrides.css">
  <link rel="stylesheet" href="/assets/css/product-text-black.css">

  <style>
    :root { --header-bg: #020617; }
    body { background: #ffffff; margin: 0; }
  </style>

  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/cart.js" defer></script>
</head>
<body>
  <div data-include="/header-tr-black"></div>

  <main class="product-page-wrap">

    <!-- Breadcrumb -->
    <nav class="product-breadcrumb">
      <a href="/shop.html">Mağaza</a>
      <span>/</span>
      <a href="/shop.html">Giyim</a>
      <span>/</span>
      Hoodie
    </nav>

    <div class="product-main-grid">

      <!-- ── Image column ── -->
      <div class="product-image-col p-reveal">
        <div class="product-main-image-wrap">
          <img id="mainImage" src="/assets/images/hoodie11.png" alt="Alba Space Hoodie">
        </div>
        <div class="product-thumbs">
          <button class="thumb-btn active" onclick="changeImage(this,'/assets/images/hoodie11.png')" aria-label="Görsel 1">
            <img src="/assets/images/hoodie11.png" alt="">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie2.png')" aria-label="Görsel 2">
            <img src="/assets/images/hoodie2.png" alt="">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie3.png')" aria-label="Görsel 3">
            <img src="/assets/images/hoodie3.png" alt="">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie4.png')" aria-label="Görsel 4">
            <img src="/assets/images/hoodie4.png" alt="">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie1.png')" aria-label="Görsel 5">
            <img src="/assets/images/hoodie1.png" alt="">
          </button>
        </div>
      </div>

      <!-- ── Info column ── -->
      <div class="product-info-col p-reveal" style="transition-delay:0.12s">

        <h1 class="product-title">Hoodie</h1>

        <div class="product-price-block">
          <span class="product-price-current">980,00 ₺</span>
        </div>

        <!-- Features -->
        <div class="product-features-card">
          <h3>Özellikler</h3>
          <ul class="product-features-list">
            <li><span class="feature-dot"></span>Yüksek kaliteli pamuk karışım kumaş</li>
            <li><span class="feature-dot"></span>Rahat ve sıcak tutma özelliği</li>
            <li><span class="feature-dot"></span>Alba Space logosu</li>
            <li><span class="feature-dot"></span>Unisex kesim — tüm bedenler</li>
          </ul>
        </div>

        <!-- Size -->
        <div class="product-size-wrap">
          <label>Beden Seçin</label>
          <div class="size-options">
            <button class="size-btn" onclick="selectSize(this)">XS</button>
            <button class="size-btn active" onclick="selectSize(this)">S</button>
            <button class="size-btn" onclick="selectSize(this)">M</button>
            <button class="size-btn" onclick="selectSize(this)">L</button>
            <button class="size-btn" onclick="selectSize(this)">XL</button>
            <button class="size-btn" onclick="selectSize(this)">XXL</button>
          </div>
        </div>

        <!-- Payment icons -->
        <div class="product-payment-icons">
          <img src="/assets/icons/mastercard.png" alt="Mastercard">
          <img src="/assets/icons/visa.png" alt="Visa">
        </div>

        <!-- Qty + CTA -->
        <div class="product-cta-row">
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(-1)">−</button>
            <input type="number" id="qtyInput" class="qty-input" value="1" min="1">
            <button class="qty-btn" onclick="updateQty(1)">+</button>
          </div>
          <button id="addToCartBtn" class="btn-add-cart"
            data-product-id="hoodie1"
            data-product-name="Hoodie"
            data-product-price="980"
            data-product-image="/assets/images/hoodie11.png"
            data-add-label="SEPETE EKLE"
            data-added-label="✓ EKLENDİ!">
            SEPETE EKLE
          </button>
          <a href="https://www.shopier.com/albaspaceshop/46492897"
            target="_blank" rel="noopener noreferrer"
            class="btn-buy-now">
            HEMEN AL
          </a>
        </div>

      </div><!-- /info col -->
    </div><!-- /main grid -->

    <!-- Related products -->
    <section class="related-section p-reveal">
      <h2>Bunları da beğenebilirsiniz</h2>
      <div class="related-accent-line"></div>
      <div id="related-products-container"></div>
    </section>

  </main>

  <div data-include="/footer-tr-black"></div>

  <script>
    function changeImage(btn, src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function updateQty(delta) {
      const input = document.getElementById('qtyInput');
      const val = Math.max(1, parseInt(input.value || 1) + delta);
      input.value = val;
    }

    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // Scroll reveal
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.p-reveal').forEach(el => observer.observe(el));

    // Add to cart
    document.getElementById('addToCartBtn').addEventListener('click', function() {
      const btn = this;
      const qty = parseInt(document.getElementById('qtyInput').value || 1, 10);
      if (typeof cartManager !== 'undefined') {
        cartManager.addItem({
          id: btn.dataset.productId,
          name: btn.dataset.productName,
          price: Number(btn.dataset.productPrice),
          image: btn.dataset.productImage,
          url: window.location.pathname,
          qty
        });
      }
      btn.classList.add('added');
      btn.textContent = btn.dataset.addedLabel || '✓ EKLENDİ!';
      btn.disabled = true;
      setTimeout(() => {
        btn.classList.remove('added');
        btn.textContent = btn.dataset.addLabel || 'SEPETE EKLE';
        btn.disabled = false;
      }, 1600);
    });
  </script>
  <script src="/assets/js/related-products.js" defer></script>
</body>
</html>
