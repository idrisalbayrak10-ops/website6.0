<!-- 🔐 AUTH LOGIC -->
<script>
const API = "https://albaspace-api.nncdecdgc.workers.dev";

function login() {
  window.location.href = API + "/auth/google";
}

function logout() {
  document.cookie = "user_id=; Max-Age=0; path=/;";
  location.reload();
}

async function checkUser() {
  try {
    const res = await fetch(API + "/me", { credentials: "include" });
    if (res.status !== 200) return;

    const user = await res.json();

    document.getElementById("user").innerHTML =
      '<div style="display:flex;gap:8px;padding:8px;">' +
      '<img src="' + user.avatar + '" width="28" style="border-radius:50%">' +
      '<span>' + user.name + '</span>' +
      '</div>';

    document.getElementById("accountAvatar").src = user.avatar;

  } catch(e) {}
}

checkUser();
</script>

<script>
(function () {
  function toggleAlienMenu(e) {
    e.preventDefault();
    const menu = document.getElementById('alienMenu');
    const trigger = document.querySelector('.alien-ghost');

    if (menu.hasAttribute('hidden')) {
      menu.removeAttribute('hidden');
      trigger.setAttribute('aria-expanded', 'true');
    } else {
      menu.setAttribute('hidden', '');
      trigger.setAttribute('aria-expanded', 'false');
    }
  }

  document.addEventListener('click', function (e) {
    const container = document.querySelector('.alien-dropdown-container');
    if (container && !container.contains(e.target)) {
      document.getElementById('alienMenu').setAttribute('hidden', '');
    }
  });

  window.toggleAlienMenu = toggleAlienMenu;
})();
</script>
