<script>
(function () {
  function toggleAlienMenu(e) {
    if (e) e.preventDefault();
    const menu = document.getElementById('alienMenu');
    const trigger = document.querySelector('.alien-ghost');
    
    if (menu && trigger) {
      if (menu.hasAttribute('hidden')) {
        menu.removeAttribute('hidden');
        trigger.setAttribute('aria-expanded', 'true');
      } else {
        menu.setAttribute('hidden', '');
        trigger.setAttribute('aria-expanded', 'false');
      }
    }
  }

  document.addEventListener('click', function (e) {
    const container = document.querySelector('.alien-dropdown-container');
    const menu = document.getElementById('alienMenu');
    if (container && menu && !container.contains(e.target)) {
      menu.setAttribute('hidden', '');
    }
  });

  window.toggleAlienMenu = toggleAlienMenu;

  // --- ФУНКЦИЯ ДЛЯ ЛОГИНА ЧЕРЕЗ GOOGLE ---
  window.login = function(options) {
    if (options && options.closeMenu) {
      const menu = document.getElementById('alienMenu');
      if (menu) menu.setAttribute('hidden', '');
    }
    const currentUrl = window.location.href;
    window.location.href = `https://albaspace-api.nncdecdgc.workers.dev/auth/google?from=${encodeURIComponent(currentUrl)}`;
  };
})();
</script>
