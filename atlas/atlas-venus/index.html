<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venüs – Alba Space</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js" crossorigin="anonymous"></script>
  <style> body { margin:0; font-family:Arial, sans-serif; background-size:cover; color:#fff; opacity:0; animation:fadeIn 0.8s ease-out forwards; } @keyframes fadeIn { to { opacity:1; } } .logo { position:fixed; top:16px; left:16px; z-index:100; } .logo img { width:70px; border-radius:50%; box-shadow:0 0 10px rgba(0,0,0,0.6); } .top-bar { position:fixed; top:16px; right:16px; z-index:90; display:flex; flex-direction:column; align-items:flex-end; gap:8px; } .lang-switch button { border:none; padding:4px 10px; margin-left:4px; border-radius:999px; color:#fff; cursor:pointer; font-size:12px; } .lang-switch button.active { color: #ffffff; font-weight:bold; } nav.main-nav { border-radius:10px; padding:6px 14px; display:flex; gap:10px; box-shadow:0 0 18px rgba(0,0,0,0.7); } nav.main-nav a { color:#fff; text-decoration:none; font-size:13px; padding:4px 8px; border-radius:6px; white-space:nowrap; } nav.main-nav a:hover { } h1 { text-align:center; margin-top:100px; margin-bottom:15px; font-size:32px; text-shadow:0 0 15px #000; } .container { width:90%; max-width:1200px; margin:auto; padding-bottom:50px; backdrop-filter:blur(2px); } p { text-align:center; font-size:18px; text-shadow:0 0 8px #000; max-width:900px; margin:20px auto; } model-viewer { width:100%; height:600px; margin-top:30px; border-radius:12px; box-shadow:0 0 30px rgba(0,150,255,0.5); } @media (max-width:768px) { h1 { font-size:26px; margin-top:90px; } model-viewer { height:420px; } nav.main-nav { flex-wrap:wrap; justify-content:flex-end; } } </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang') || 'tr';
      document.documentElement.lang = lang;
      const trBtn = document.getElementById('lang-tr');
      const enBtn = document.getElementById('lang-en');
      if (trBtn && enBtn) {
        if (lang === 'tr') {
          trBtn.classList.add('active');
        } else {
          enBtn.classList.add('active');
        }
        function setLang(code) {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', code);
          window.location.href = url.toString();
        }
        trBtn.onclick = () => setLang('tr');
        enBtn.onclick = () => setLang('en');
      }
    });
  </script>

  <link rel="stylesheet" href="/assets/css/site.css" />
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/model-viewer-debug.js" defer></script>
</head>
<body>
  <div data-include="/header-tr.html"></div>

  <h1 style="margin-top: 20px;">Venüs</h1>

  <div class="container">
    <p>Venüs, yoğun atmosferi ve güçlü sera etkisiyle çok yüksek yüzey sıcaklıklarına sahiptir.</p>
    <!-- Добавлен id="mainViewer" и убран жесткий src -->
    <model-viewer id="mainViewer" data-track="model_view" data-model-name="venus"
      camera-controls
      ar
      ar-modes="webxr scene-viewer quick-look">
    </model-viewer>

    <!-- Скрипт проверки доступа -->
    <script>
      async function loadProtectedModel() {
        const viewer = document.getElementById('mainViewer');
        const modelSlug = "venus"; // Название товара в твоей базе данных Cloudflare

        // 1. По умолчанию сразу ставим заглушку (для тех, кто не залогинен или не купил)
        viewer.src = "/assets/models/zaglushka.glb";

        try {
          // 2. Спрашиваем воркер, есть ли доступ (credentials: "include" передает куки авторизации)
          const response = await fetch(`https://albaspace-api.nncdecdgc.workers.dev/product-access?slug=${modelSlug}`, {
            credentials: "include" 
          });

          if (response.ok) {
            const data = await response.json();
            
            // 3. Если воркер ответил "premium", меняем модель на секретную из R2
            if (data.access === "premium") {
              console.log("✅ Доступ разрешен! Загружаем премиум-модель...");
              // model-viewer не отправляет cookie — качаем вручную через blob URL
              const modelRes = await fetch(
                `https://albaspace-api.nncdecdgc.workers.dev/model?slug=${modelSlug}`,
                { credentials: "include" }
              );
              if (!modelRes.ok) {
                console.error("❌ Ошибка загрузки модели:", modelRes.status);
              } else {
                const blob = await modelRes.blob();
                viewer.src = URL.createObjectURL(blob);
              }
            } else {
              console.log("🔒 Доступа нет, оставлена бесплатная заглушка.");
            }
          }
        } catch (err) {
          console.error("Ошибка при проверке доступа:", err);
        }
      }

      // Запускаем проверку, как только страница загрузится
      document.addEventListener('DOMContentLoaded', loadProtectedModel);
    </script> 
  <div data-include="/footer-tr.html"></div>

    <!-- Model Viewer Fix Script - Direct initialization -->
  <script>
    (function() {
      console.log('[Model-Viewer Init] Checking model-viewer status...');
      
      // Wait for model-viewer to be loaded
      const checkModelViewer = () => {
        const viewer = document.querySelector('model-viewer');
        if (!viewer) {
          console.log('[Model-Viewer Init] No model-viewer element found');
          return;
        }
        
        // Check if custom element is registered
        if (window.customElements && window.customElements.get('model-viewer')) {
          console.log('[Model-Viewer Init] model-viewer element is registered ✓');
          return;
        }
        
        // If not registered yet, check again in 500ms
        setTimeout(checkModelViewer, 500);
      };
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkModelViewer);
      } else {
        setTimeout(checkModelViewer, 100);
      }
    })();
  </script>
</body>
</html>
