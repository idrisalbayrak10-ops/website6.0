n:center; } .footer-logo img{ width:52px;height:52px; border-radius:999px; padding:4px; } .footer-social{ display:flex; justify-content:center; gap:14px; margin-bottom:6px; } .footer-address p, .footer-center p{ margin:2px 0; } @media(max-width:900px){ .footer-grid{grid-template-columns:1fr;} .header-inner{justify-content:center;} .header-social{margin-left:0;} } </style>

<script>
    const revealItems = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          obs.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.18,
      rootMargin: '0px 0px -8% 0px'
    });

    revealItems.forEach((item, index) => {
      const delay = item.dataset.direction === 'left' ? index * 0.025 : index * 0.03;
      item.style.setProperty('--reveal-delay', `${delay}s`);
      observer.observe(item);
    });
  </script>
