<!DOCTYPE html>

<html class="product-text-black" lang="en">
<head>
<link href="/assets/icons/AlbaLogo.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/icons/AlbaLogo.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="/manifest.json" rel="manifest"/>
<meta content="#020617" name="theme-color"/>
<meta charset="utf-8"/>

<title>Book — Albamen and Lara – Alba Space</title>
<meta content="The story of Albamen and Lara — colourful illustrations, hard-cover print edition." name="description"/>
<meta content="Book — Albamen and Lara – Alba Space" property="og:title"/>
<meta content="The story of Albamen and Lara — colourful illustrations, hard-cover print edition." property="og:description"/>
<meta content="/assets/images/albamenvelara.jpg" property="og:image"/>
<meta content="https://albaspace.com.tr/eng/product-albamenvelara.html" property="og:url"/>

<link href="/assets/css/site.css" rel="stylesheet"/>
<link href="/assets/css/fix-layout.css" rel="stylesheet"/>
<link href="/assets/css/product.css" rel="stylesheet"/>
<link href="/assets/css/product-overrides.css" rel="stylesheet"/>
<link href="/assets/css/product-text-black.css" rel="stylesheet"/>
<style>
    :root { --header-bg: #020617; }
    body { background: #ffffff; margin: 0; }
  </style>
<script defer="" src="/assets/js/include.js"></script>
<script defer="" src="/assets/js/menu-toggle.js"></script>
<script defer="" src="/assets/js/cart.js"></script>
</head>
<body>
<div data-include="/header-en-black"></div>
<main class="product-page-wrap">
<nav class="product-breadcrumb">
<a href="/eng/shop.html" style="color:inherit;text-decoration:none">Shop</a><span>/</span>Books
    </nav>
<div class="product-main-grid">
<div class="product-image-col p-reveal">
<div class="product-main-image-wrap">
<img alt="Book — Albamen and Lara" id="mainImage" src="/assets/images/albamenvelara.jpg"/>
</div>
<div class="product-thumbs">
<button aria-label="Book" class="thumb-btn active" onclick="changeImage(this,'/assets/images/albamenvelara.jpg')">
<img alt="Book" loading="lazy" src="/assets/images/albamenvelara.jpg"/>
</button>
<button aria-label="Book 2" class="thumb-btn" onclick="changeImage(this,'/assets/images/albamenvelara1.png')">
<img alt="Book 2" loading="lazy" src="/assets/images/albamenvelara1.png"/>
</button>
<button aria-label="Book 3" class="thumb-btn" onclick="changeImage(this,'/assets/images/albamenvelara2.png')">
<img alt="Book 3" loading="lazy" src="/assets/images/albamenvelara2.png"/>
</button>
<button aria-label="Book 4" class="thumb-btn" onclick="changeImage(this,'/assets/images/albamenvelara3.png')">
<img alt="Book 4" loading="lazy" src="/assets/images/albamenvelara3.png"/>
</button>
<button aria-label="Book 5" class="thumb-btn" onclick="changeImage(this,'/assets/images/albamenvelara4.png')">
<img alt="Book 5" loading="lazy" src="/assets/images/albamenvelara4.png"/>
</button>
</div>
</div>
<div class="product-info-col p-reveal" style="transition-delay:0.12s">
<h1 class="product-title">Book — Albamen and Lara</h1>
<div class="product-price-block">
<span class="product-price-current">1.000,00 ₺</span>
</div>
<div class="product-features-card">
<h3>Features</h3>
<ul class="product-features-list">
<li><span class="feature-dot"></span>The story of Albamen and Lara</li>
<li><span class="feature-dot"></span>Inspiring narrative</li>
<li><span class="feature-dot"></span>Full-colour illustrations</li>
<li><span class="feature-dot"></span>Premium hard-cover print</li>
</ul>
</div>
<div class="product-payment-icons">
<img alt="Mastercard" src="/assets/icons/mastercard.png"/>
<img alt="Visa" src="/assets/icons/visa.png"/>
</div>
<div class="product-cta-row">
<div class="qty-control">
<button class="qty-btn" onclick="updateQty(-1)">−</button>
<input class="qty-input" id="qtyInput" min="1" type="number" value="1"/>
<button class="qty-btn" onclick="updateQty(1)">+</button>
</div>
<button class="btn-add-cart" data-add-label="ADD TO CART" data-added-label="✓ ADDED!" data-product-id="albamenvelara" data-product-image="/assets/images/albamenvelara.jpg" data-product-name="Book — Albamen and Lara" id="addToCartBtn">
            ADD TO CART
          </button>
</div>
</div>
</div>
<section class="related-section p-reveal">
<h2>You may also like</h2>
<div class="related-accent-line"></div>
<div id="related-products-container"></div>
</section>
</main>
<div data-include="/footer-en-black"></div>
<script>
    function changeImage(btn, src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    function updateQty(d) {
      const i = document.getElementById('qtyInput');
      i.value = Math.max(1, parseInt(i.value || 1) + d);
    }
    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const obs = new IntersectionObserver(
      es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.p-reveal').forEach(el => obs.observe(el));
    document.getElementById('addToCartBtn').addEventListener('click', function() {
      const btn = this, qty = parseInt(document.getElementById('qtyInput').value || 1, 10);
      if (typeof cartManager !== 'undefined') {
        cartManager.addItem({
          id: btn.dataset.productId, name: btn.dataset.productName,
          image: btn.dataset.productImage, url: window.location.pathname, qty
        });
      }
      btn.classList.add('added');
      btn.textContent = btn.dataset.addedLabel;
      btn.disabled = true;
      setTimeout(() => {
        btn.classList.remove('added');
        btn.textContent = btn.dataset.addLabel;
        btn.disabled = false;
      }, 1600);
    });
  </script>
<script defer="" src="/assets/js/related-products.js"></script>
</body>
</html>
