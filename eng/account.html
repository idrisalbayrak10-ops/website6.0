<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Questionnaire | Alba Space</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/icons/AlbaLogo.png" sizes="32x32">
  <link rel="stylesheet" href="/assets/css/site.css" />
  <link rel="stylesheet" href="/assets/css/fix-layout.css" />
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/mobile-header-cart.js" defer></script>
  <style>
    body.account-page { background: #020617; color: #e5e7eb; }
    .account-main { max-width: 760px; margin: 120px auto 60px; padding: 0 20px; }
    .account-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 30px 28px; box-shadow: 0 20px 80px rgba(0,0,0,0.25); }
    .account-card h1 { margin-bottom: 14px; font-size: 32px; }
    .account-card p { margin-bottom: 24px; color: #9ca3af; }
    .account-field { margin-bottom: 16px; display: grid; gap: 8px; }
    .account-field label { display: block; font-size: 14px; color: #cbd5e1; }
    .account-field input, .account-field textarea { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: #f8fafc; }
    .account-field textarea { min-height: 120px; resize: vertical; }
    .account-actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
    .account-message { margin-top: 16px; color: #7dd3fc; }
    .btn-primary { background: #00c2ff; color: #020617; border: none; }
  </style>
</head>
<body class="account-page">
  <div data-include="/header-en.html"></div>
  <main class="account-main">
    <section class="account-card">
      <h1>Account Questionnaire</h1>
      <p>Complete your account details so we can personalize your experience.</p>
      <form id="accountForm">
        <div class="account-field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required>
        </div>
        <div class="account-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Your email" required>
        </div>
        <div class="account-field">
          <label for="favorite">Favorite Space Experience</label>
          <input id="favorite" name="favorite" type="text" placeholder="e.g. Mars tour, VR space show...">
        </div>
        <div class="account-field">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Any notes about yourself..."></textarea>
        </div>
        <div class="account-actions">
          <button type="submit" class="btn-primary">Save</button>
        </div>
        <div id="accountMessage" class="account-message" aria-live="polite"></div>
      </form>
    </section>
  </main>
  <script>
    const API_BASE = "https://albaspace-api.nncdecdgc.workers.dev";
    const form = document.getElementById('accountForm');
    const message = document.getElementById('accountMessage');

    async function loadProfileData() {
      const saved = localStorage.getItem('albaspace_account_profile');
      let profile = {
        name: '',
        email: '',
        favorite_experience: '',
        notes: ''
      };

      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          profile = { ...profile, ...parsed };
        } catch (error) {
          console.debug('Unable to parse stored profile', error);
        }
      }

      try {
        const response = await fetch(`${API_BASE}/me`, {
          credentials: 'include'
        });
        if (response.ok) {
          const data = await response.json();
          profile.name = data.name || profile.name;
          profile.email = data.email || profile.email;
          if (data.profile) {
            profile.favorite_experience = data.profile.favorite_experience || profile.favorite_experience;
            profile.notes = data.profile.notes || profile.notes;
          }
        }
      } catch (error) {
        console.debug('Unable to load remote profile', error);
      }

      document.getElementById('name').value = profile.name;
      document.getElementById('email').value = profile.email;
      document.getElementById('favorite').value = profile.favorite_experience;
      document.getElementById('notes').value = profile.notes;
    }

    loadProfileData();

    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      const data = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        favorite_experience: document.getElementById('favorite').value.trim(),
        notes: document.getElementById('notes').value.trim()
      };
      try {
        localStorage.setItem('albaspace_account_profile', JSON.stringify(data));
      } catch (err) {
        // ignore local save errors
      }

      if (typeof window.saveAccountProfile === 'function') {
        const result = await window.saveAccountProfile(data);
        message.textContent = result.message;
        if (!result.ok && !result.serverSaved) {
          message.textContent = 'Unable to save on server, but data stored locally.';
        }
      } else {
        message.textContent = 'Account information saved locally.';
      }
    });
  </script>
</body>
</html>
